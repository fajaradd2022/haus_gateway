services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: helpdesk_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Mini Helpdesk AI Assist"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-haus_gateway}
      DB_USERNAME: ${DB_USERNAME:-helpdesk}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database

      LOG_CHANNEL: stderr
      LOG_LEVEL: error

      WAHA_URL: ${WAHA_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_SESSION: ${WAHA_SESSION:-default}

      SUMOPOD_BASE_URL: ${SUMOPOD_BASE_URL:-https://ai.sumopod.com/v1}
      SUMOPOD_API_KEY: ${SUMOPOD_API_KEY}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: mysql:8.0
    container_name: helpdesk_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-haus_gateway}
      MYSQL_USER: ${DB_USERNAME:-helpdesk}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  app_storage:
  app_logs:

networks:
  helpdesk_net:
    driver: bridge
